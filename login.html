<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — SafeTag QR</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, var(--color-primario) 0%, #2E75B6 100%);
            color: white;
            padding: 2.5rem 1.5rem;
            text-align: center;
        }
        .page-header h1 { font-size: 1.9rem; margin-bottom: 0.4rem; }
        .page-header p  { opacity: 0.85; font-size: 1rem; }

        .login-container {
            max-width: 420px;
            margin: 2.5rem auto;
            padding: 0 1rem;
        }
        .card {
            background: var(--color-superficie, #fff);
            border: 1px solid var(--color-borde, #e0e0e0);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--color-texto, #333);
        }
        .form-group input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1.5px solid var(--color-borde, #ccc);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--color-primario, #1F4E78);
        }
        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-primario, #1F4E78);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #2E75B6; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            background: #fdecea;
            border: 1px solid #f5c6cb;
            color: #842029;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
        .link-registro {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.9rem;
            color: var(--color-texto-suave, #666);
        }
        .link-registro a {
            color: var(--color-primario, #1F4E78);
            font-weight: 600;
            text-decoration: none;
        }
        .link-registro a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Navbar (mismo estilo que el resto del sitio) -->
    <nav class="navbar">
        <div class="navbar-contenido">
            <a href="index.html" class="navbar-logo">
                <span class="logo-icono">🏷️</span>
                <span class="logo-texto">SafeTag QR</span>
            </a>
            <ul class="navbar-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="registro.html">Crear cuenta</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <h1>Iniciar sesión</h1>
        <p>Accede a tu panel para gestionar tus pulseras</p>
    </header>

    <div class="login-container">
        <div class="card">
            <div class="error-msg" id="error-msg"></div>

            <form id="form-login" novalidate>
                <div class="form-group">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" placeholder="tu@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" id="btn-login">Iniciar sesión</button>
            </form>

            <div class="link-registro">
                ¿No tienes cuenta? <a href="registro.html">Crear cuenta</a>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const correo   = document.getElementById('correo').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btn-login');
            const errEl    = document.getElementById('error-msg');

            errEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            try {
                const resp = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, password })
                });
                const data = await resp.json();

                if (!resp.ok) {
                    errEl.textContent = data.error || 'Error al iniciar sesión';
                    errEl.style.display = 'block';
                    return;
                }

                // Guardar datos del usuario en sessionStorage
                sessionStorage.setItem('usuario', JSON.stringify(data));
                window.location.href = 'panel.html';
            } catch (err) {
                errEl.textContent = 'No se pudo conectar con el servidor. Verifica que el backend esté en línea.';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Iniciar sesión';
            }
        });
    </script>
</body>
</html>
